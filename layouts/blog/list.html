{{ define "main" }}
<h1>Blog</h1>

<ul class="blog-list">
  {{ range .Pages }}
    <li>
      <a class="post-title" href="{{ .RelPermalink }}">{{ .Title }}</a>
      <p class="post-meta">Added {{ .Date.Format "Jan 2, 2006" }}; Last Updated {{ .Lastmod.Format "Jan 2, 2006" }}</p>
      <p class="post-desc">{{ .Description }}</p>
    </li>
  {{ end }}
</ul>
{{ end }}
