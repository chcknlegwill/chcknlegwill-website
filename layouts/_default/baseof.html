<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ .Title }}</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&display=swap"> 
</head>
<body>
    <header>
      <div class="header">
        <div class="links">
          <a href="https://github.com/chcknlegwill/" target="_blank">
            <img class="github-logo" id="github" alt="github logo" src="/assets/github_dark.png">
          </a>
        </div>
        <div class="title-container">
          <a class="bruh" href="/">
            <h1 class="title" href="/">chcknlegwill</h1>
          </a>
        </div>
        <div class="links">
        </div>
      </div>
    </header>
    <nav>
      <div class="nav">
        <a href="/" {{ if .IsHome }}class="active"{{ end }}>Home</a>
        <a href="/blog" {{ if eq .Section "blog" }}class="active"{{ end }}>Blog</a>
        <a href="/about" {{ if eq (.RelPermalink | strings.TrimRight "/") "/about" }}class="active"{{ end }}>About</a>
        <a href="/projects" {{ if eq .Section "projects" }}class="active"{{ end }}>Projects</a>
      </div>
    </nav>

    <main>
        {{ block "main" . }}{{ end }}
    </main>
</body>
</html>
