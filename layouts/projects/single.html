{{ define "main" }}
<div class="project-container">
  <header class="project-header">
    <h1>{{ .Title }}</h1>
    <p class="date">Published: {{ .Date.Format "Jan 2, 2006" }} | Last edited: {{ .Lastmod.Format "Jan 2, 2006" }}</p>
  </header>
  <hr>
  <article class="blog-content">
    {{ .Content }}
  </article>
</div>
{{ end }}
